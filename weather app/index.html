<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Minimal Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." spellcheck="false">
            <button id="searchBtn">Search</button>
        </div>
        
        <div class="weather-card" id="weatherResult" style="display: none;">
            <h2 id="cityName">London</h2>
            <p id="description">Clear Sky</p>
            <h1 id="temp">20°C</h1>
            <div class="details">
                <div class="col">
                    <p>Humidity</p>
                    <p id="humidity">50%</p>
                </div>
                <div class="col">
                    <p>Wind</p>
                    <p id="wind">15 km/h</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
